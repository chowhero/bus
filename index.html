<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能巴士站顯示屏 PRO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 📱 頂部置中導航欄 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background-color: #000;
            gap: 15px;
            border-bottom: 1px solid #222;
        }

        .search-icon {
            font-size: 18px;
            color: #fff;
            margin-right: 5px;
        }

        .nav-item {
            color: #e5e5e5;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 18px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .nav-item.active {
            background-color: #333333;
            color: #ffffff;
            font-weight: bold;
        }

        /* 內容區 */
        .content {
            flex: 1;
            position: relative;
            background-color: #000;
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page.active {
            display: flex;
        }

        /* 🕒 頁面一：詳細天氣與警告 */
        #weather-page {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #141414 0%, #080808 100%);
            padding: 40px;
            text-align: center;
        }
        .clock {
            font-size: 90px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 2px;
            color: #fff;
        }
        .date-info {
            font-size: 26px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .weather-box {
            display: flex;
            gap: 30px;
            background: #1f1f1f;
            padding: 25px 40px;
            border-radius: 15px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .temp-big { font-size: 50px; font-weight: bold; color: #ffcc00; }
        .weather-text { font-size: 24px; color: #eee; }
        
        .warning-banner {
            margin-top: 25px;
            background-color: #cc1111;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        /* 🚌 頁面二：班次顯示 + 廣告雙欄排版 */
        #bus-page {
            background-color: #f0f4f8;
            color: #000;
        }
        
        .ads-panel {
            width: 45%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-right: 4px solid #ccc;
        }
        .ads-panel video, .ads-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bus-panel {
            width: 55%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }
        .eta-header {
            background-color: #cc1111;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
        }
        .bus-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .route-no { font-size: 48px; font-weight: 900; color: #111; }
        .dest { font-size: 18px; color: #555; margin-top: 5px; }
        .min-big { font-size: 55px; font-weight: bold; color: #0066cc; }

        /* 📷 頁面三：交通快拍 */
        #snapshot-page {
            background-color: #000;
            justify-content: center;
            align-items: center;
        }
        #snapshot-page img { max-height: 90%; max-width: 95%; border: 2px solid #333; }

        /* ⚙️ 頁面四：設定頁 */
        #settings-page {
            background-color: #fff;
            color: #000;
            padding: 30px;
            flex-direction: column;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .save-btn { background-color: #e50914; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="navbar">
        <span class="search-icon">🔍</span>
        <div class="nav-item active" onclick="switchTab('weather-page', this)">時間同天氣</div>
        <div class="nav-item" onclick="switchTab('bus-page', this)">班次顯示</div>
        <div class="nav-item" onclick="switchTab('snapshot-page', this)">交通快拍</div>
        <div class="nav-item" onclick="switchTab('settings-page', this)">設定</div>
    </div>

    <div class="content">
        <div id="weather-page" class="page active">
            <div class="clock" id="live-clock">00:00:00</div>
            <div class="date-info" id="live-date">----年--月--日</div>
            
            <div class="weather-box">
                <div>
                    <span class="temp-big" id="hko-temp">--</span><span style="font-size:28px; color:#ffcc00;">°C</span>
                </div>
                <div class="weather-text" id="hko-desc">正在下載天氣數據...</div>
            </div>
            <div class="warning-banner" id="warning-box">⚠️ 提示</div>
        </div>

        <div id="bus-page" class="page">
            <div class="ads-panel">
                <video src="https://assets.mixkit.co/videos/preview/mixkit-traffic-in-a-modern-city-at-night-42232-large.mp4" autoplay loop muted></video>
            </div>
            <div class="bus-panel">
                <div class="eta-header">
                    <span>路線 Route</span>
                    <span>分鐘 min(s)</span>
                </div>
                <div id="bus-rows-container" style="flex:1;">
                    <div style="padding:40px; text-align:center; color:#999; font-size:18px;">請先到「設定」輸入正確的 Route 同 Stop ID。</div>
                </div>
            </div>
        </div>

        <div id="snapshot-page" class="page">
            <img id="cam-img" src="https://tdcctv.data.gov.hk/N411F.JPG" alt="路面快拍">
        </div>

        <div id="settings-page" class="page">
            <h2 style="margin-bottom: 20px;">巴士顯示屏設定</h2>
            <div class="form-group">
                <label>巴士路線 (例如: 95)：</label>
                <input type="text" id="input-route" placeholder="請填寫路線">
            </div>
            <div class="form-group">
                <label>九巴車站代碼 (Stop ID)：</label>
                <input type="text" id="input-stop" placeholder="請填寫對應車站嘅 Stop ID">
            </div>
            <button class="save-btn" onclick="saveSettings()">儲存並即時應用</button>
        </div>
    </div>

    <script>
        function switchTab(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            if(pageId === 'bus-page') { updateBusData(); }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('live-date').innerText = `${now.getFullYear()}年${String(now.getMonth()+1).padStart(2,'0')}月${String(now.getDate()).padStart(2,'0')}日`;
        }
        setInterval(updateClock, 1000); updateClock();

        // 天文台數據導入 (整合超穩定的 corsproxy.io)
        async function fetchWeatherAndWarnings() {
            try {
                const apiWeather = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc';
                const apiWarn = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc';
                
                const weatherRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiWeather)}`);
                const wData = await weatherRes.json();
                document.getElementById('hko-temp').innerText = wData.temperature.data[0].value;
                document.getElementById('hko-desc').innerText = wData.episodes ? wData.episodes[0].wording : "天氣大致良好";

                const warnRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiWarn)}`);
                const warnData = await warnRes.json();
                const warnBox = document.getElementById('warning-box');
                
                if(Object.keys(warnData).length > 0) {
                    let warningTexts = [];
                    for (let key in warnData) { warningTexts.push(warnData[key].name); }
                    warnBox.innerText = "⚠️ 現正生效： " + warningTexts.join(' | ');
                    warnBox.style.display = 'block';
                } else {
                    warnBox.style.display = 'none';
                }
            } catch(e) { console.log("天氣更新失敗"); }
        }
        setInterval(fetchWeatherAndWarnings, 60000);
        fetchWeatherAndWarnings();

        function saveSettings() {
            const r = document.getElementById('input-route').value.trim().toUpperCase();
            const s = document.getElementById('input-stop').value.trim();
            if(!r || !s) return alert("要填晒兩項啊！");
            localStorage.setItem('bus_r', r);
            localStorage.setItem('bus_s', s);
            alert("設定儲存成功！");
            updateBusData();
        }

        if(localStorage.getItem('bus_r')) {
            document.getElementById('input-route').value = localStorage.getItem('bus_r');
            document.getElementById('input-stop').value = localStorage.getItem('bus_s');
        }

        // 九巴到站班次 (導入最安全穩定嘅 corsproxy 繞過 GitHub Pages 限制)
        async function updateBusData() {
            const r = localStorage.getItem('bus_r');
            const s = localStorage.getItem('bus_s');
            const container = document.getElementById('bus-rows-container');
            if(!r || !s) return;

            try {
                const targetUrl = `https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${r}/1`;
                // 使用極為安全且速度快的 corsproxy.io
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`);
                const json = await res.json();
                const stopData = json.data.filter(item => item.stop === s);

                if(stopData.length > 0) {
                    let html = '';
                    for(let i=0; i < Math.min(stopData.length, 2); i++) {
                        const min = stopData[i].minutes_to_arrival;
                        const dest = stopData[i].dest_tc;
                        html += `
                            <div class="bus-row">
                                <div>
                                    <span class="route-no">${r}</span>
                                    <div class="dest">往 ${dest}</div>
                                </div>
                                <div>
                                    <span class="min-big">${min !== null ? min : '即到'}</span>
                                    <span style="font-size:20px; color:#0066cc; font-weight:bold;">${min !== null ? ' min' : ''}</span>
                                </div>
                            </div>
                        `;
                    }
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div style="padding:40px; text-align:center; color:red; font-size:18px;">搵唔到呢個 Stop ID 嘅班次。請確保 Stop ID 填寫正確。</div>`;
                }
            } catch(e) { container.innerHTML = `<div style="padding:40px; text-align:center; color:red;">網絡連線逾時或暫時繁忙。</div>`; }
        }

        // 定時沖刷快拍
        setInterval(() => {
            updateBusData();
            const ts = new Date().getTime();
            // 直接以 Image 物件形式重寫 src，避免跨域 DNS 解析被阻擋
            document.getElementById('cam-img').src = "https://tdcctv.data.gov.hk/N411F.JPG?t=" + ts;
        }, 60000);
    </script>
</body>
</html>
